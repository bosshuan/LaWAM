model:
  checkpoint: /mnt/sfs_turbo/fyy/checkpoints/vjepa2/vjepa2_1_vitG_384.pt
  text_backend: t5
  text_model: /mnt/sfs_turbo/fyy/checkpoints/text/t5-large
  text_local_files_only: true

data:
  root: /mnt/sfs_turbo/rl/InternData-A1/sim
  backend: lerobot_v21
  sample_stride: 10
  max_subdatasets: null
  max_episodes_per_subdataset: null

train:
  run_name: interndata_a1_stage1_full_sim_pilot
  output_root: outputs
  stage: future
  max_steps: 100
  batch_size_per_gpu: 1
  grad_accum_steps: 8
  num_workers: 4
  predictor_lr: 1.0e-5
  new_module_lr: 3.0e-4
  lr_schedule: cosine
  min_lr_ratio: 0.01
  weight_decay: 0.05
  warmup_fraction: 0.05
  gradient_clip: 1.0
  log_every: 5
  save_every: 50
  bf16: true
  deterministic: false

model:
  checkpoint: /opt/huawei/dataset/d_env_wulan/vjepa2/checkpoints/vjepa2_1_vitG_384.pt
  text_backend: t5
  text_model: /opt/huawei/dataset/d_env_wulan/text/t5-large
  text_local_files_only: true

data:
  backend: lerobot_v21
  roots:
    - /opt/huawei/dataset/data_w/processed/OXE
    - /opt/huawei/dataset/data_w/processed/AgiBotWorld-Beta-lerobot2.1
    - /opt/huawei/dataset/d_data_wulan/datasets/InternData-A1/real
    - /opt/huawei/dataset/d_data_wulan/datasets/InternData-A1/sim_updated
    - /opt/huawei/dataset/data_w/processed/RoboMind
    - /opt/huawei/dataset/d_data_wulan/datasets/StarVLA/RoboTwin-Randomized/Randomized
  source_names:
    - oxe
    - agibot_world
    - interndata_a1_real
    - interndata_a1_sim_updated
    - robomind
    - robotwin_randomized
  control_adapter_overrides:
    # OXE mixes Cartesian Euler-delta and joint action schemas. It is admitted
    # only to this future-only Stage 1 pilot until SO(3) action loss is added.
    oxe: oxe_mixed_control
    # The storage audit verified RoboMind's exact float32 action/actions/state
    # aliases, dimensions, and matching stats_gr00t normalization.
    robomind: robomind_joint_vector
  # The five active datasets are equally weighted for the engineering pilot.
  # The two InternData roots split its one-dataset share equally; top-level sim
  # is not used. RoboMind uses its explicitly audited vector adapter.
  # Replace these explicit weights after manifest review.
  mixture_weights: [1.0, 1.0, 0.5, 0.5, 1.0, 1.0]
  mixture_epoch_samples: 3200
  strict_manifest: true
  exclude_contains:
    - real_lerobotv30
    - sim_updated_lerobotv30
    - long_horizon_tasks/lift2/handover_objects_right_left_part8
    - pick_and_place_tasks/franka/multiple_pick_and_place_part2/basket
    - pick_and_place_tasks/split_aloha/single_pick_right_arm/omniobject3d-pitaya
  sample_stride: 10
  max_subdatasets: null
  max_episodes_per_subdataset: null

train:
  run_name: h800_4node_stage1_mixture_pilot
  output_root: outputs
  stage: future
  max_steps: 50
  batch_size_per_gpu: 1
  grad_accum_steps: 2
  num_workers: 2
  predictor_lr: 1.0e-5
  new_module_lr: 3.0e-4
  lr_schedule: cosine
  min_lr_ratio: 0.01
  weight_decay: 0.05
  warmup_fraction: 0.05
  gradient_clip: 1.0
  log_every: 5
  save_every: 25
  bf16: true
  deterministic: false

video:
  resolution: 384
  context_frames: 8
  future_frames: 4
  video_fps: 4.0
  patch_size: 16
  tubelet_size: 2
  camera_key: auto

action:
  chunk_size: 10
  action_hz: 10.0
  proprio_history: 4
  past_action_history: 2
  max_action_dim: 32
  max_proprio_dim: 64
  schema_buckets: 1024

model:
  checkpoint: /mnt/sfs_turbo/fyy/checkpoints/vjepa2/vjepa2_1_vitG_384.pt
  encoder_embed_dim: 1664
  encoder_depth: 48
  predictor_embed_dim: 384
  predictor_depth: 24
  predictor_heads: 12
  predictor_mask_tokens: 8
  joint_start_block: 12
  reciprocal_start_block: 18
  joint_attention: time_aligned
  conditioning_blocks: [4, 11, 17, 23]
  activation_checkpointing: true
  text_backend: t5
  text_model: google-t5/t5-large
  text_local_files_only: true
  max_text_tokens: 64

data:
  root: /mnt/sfs_turbo/rl/InternData-A1/sim
  backend: lerobot_v21
  include_globs: ["**/meta/info.json"]
  exclude_contains: [real_lerobotv30, sim_updated_lerobotv30]
  sample_stride: 10
  max_subdatasets: null
  max_episodes_per_subdataset: null
  decode_threads: 1
  train_fraction: 0.995
  seed: 239

loss:
  future_weight: 1.0
  action_weight: 1.0
  smoothness_weight: 0.01
  gripper_weight: 1.0
  huber_delta: 1.0
  normalize_future_levels: true

train:
  run_name: interndata_a1_joint
  output_root: outputs
  stage: joint
  max_steps: 120000
  batch_size_per_gpu: 1
  grad_accum_steps: 8
  num_workers: 4
  predictor_lr: 1.0e-5
  new_module_lr: 3.0e-4
  min_lr_ratio: 0.01
  weight_decay: 0.05
  warmup_fraction: 0.05
  gradient_clip: 1.0
  log_every: 10
  save_every: 1000
  seed: 239
  bf16: true
  compile: false
  resume: null
  init_student: null
  find_unused_parameters: false
